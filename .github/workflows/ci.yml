name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: store_rating
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d store_rating"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prisma migrate & generate
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/store_rating?schema=public
        run: |
          npx prisma generate
          npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Test API
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/store_rating?schema=public
          JWT_ACCESS_SECRET: ci-access-secret-min-32-characters-long
          JWT_REFRESH_SECRET: ci-refresh-secret-min-32-characters-long
        run: npm test

      - name: Test Web
        working-directory: apps/web
        run: npm test

      - name: Build
        run: npm run build
